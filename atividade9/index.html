<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API CEP</title>
</head>
<body style="background-color: rgb(188, 207, 241);">
    <main style="margin: 30px;">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <h1>Formulário de CEP</h1>
            <label for="cep">Digite seu CEP (Sem hífen):</label>
            <input type="text" id="cep" placeholder="Ex: 01001000">
    
            <br><br>
            <label for="rua">Rua:</label>
            <input type="text" id="rua" placeholder="Ex: 10">
            <br><br>
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" placeholder="Ex: Meu bairro">
            <br><br>
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Ex: Brasília">
            <br><br>
            <label for="uf">Estado:</label>
            <input type="text" id="uf" placeholder="Ex: DF">
        
      </div>  
    <script src="js/buscaCEPatividade.js"></script>
    </main>

    
</body>
</html>
