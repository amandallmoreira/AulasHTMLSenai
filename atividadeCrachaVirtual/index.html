<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Crachá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/style.css">

</head>
<body class="container p-5">
    <main>
        <h1>Crachá Virtual</h1>
        <div class="container">
            <form>
                <div>
                    <label 
                    class="form-label"
                    for="nome"
                    >Digite seu nome:</label>

                    <input 
                    class="form-control p-3" 
                    type="text"
                    id="nome">

                    <label class="form-label"
                    for="idade">Digite sua idade:</label>

                    <input 
                    class="form-control p-3" 
                    type="number"
                    id="idade">

                    <label 
                    class="form-label"
                    for="cargo">Selecione seu cargo:</label>

                    <select class="form-control" id="cargo">
                        <option value="Desenvolvedor Jr">Desenvolvedor Jr</option>
                        <option value="Desenvolvedor Pleno">Desenvolvedor Pleno</option>
                        <option value="Desenvolvedor Sênior">Desenvolvedor Sênior</option>
                        <option value="Analista de Dados">Analista de Dados</option>
                        <option value="Gerente de Projetos">Gerente de Projetos</option>
                    </select>

                    <label class="form-label"
                    for="departamento">Selecione seu Departamento:</label>
                   <select class="form-control" id="departamento">
                        <option value="Desenvolvimento de Software">Desenvolvimento de Software</option>
                        <option value="Dados">Dados</option>
                        <option value="Infraestrutura">Infraestrutura</option>
                        <option value="Segurança da Informação">Segurança da Informação</option>
                        <option value="Projetos">Projetos</option>
                    </select>
                    <!-- RADIO -->
                    <label for="temAcessoRestrito">Funcionário tem acesso restrito?</label>
                    <input type="radio" name="temAcessoRestrito" value="Sim" id="temAcessoRestritoSim"><label for="temAcessoRestritoSim">Sim</label>
                    <input type="radio" name="temAcessoRestrito" value="Não" id="temAcessoRestritoNao"><label for="temAcessoRestritoNao">Não</label>
                    
                </div>
                <br>
                <button class="btn btn-primary" type="button" onclick="imprimirCracha()">Enviar dados</button>
            </form>
            <!-- Comentário HTML - Comentar  Ctrl + ;     -->
            <script src="js/script.js"></script>
            
        </div>
        
    </main>
    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   
</body>
</html>
